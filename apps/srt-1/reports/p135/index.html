  // Period 133 Topics
  setDesc(133,'tp','Update ORDAO configuration','Current configuration of Eden Fractal&apos;s ORDAO was meant to be temporary to allow old participants to claim their old respect before any contentious ORDAO proposals are executed. Current configuration is also becoming too limiting when we start passing more proposals per week.<br><br>I propose to make the these configuration changes: <a href="https://hackmd.io/@sim31/ef-ordao-config-update">https://hackmd.io/@sim31/ef-ordao-config-update</a><br><br>This will only take a moment to pass and then we can move on to the next topics.<br><br>I already made ordao proposals that would implement these changes in 18 days, assuming we don&apos;t cancel it before then:<br>* <a href="https://eden.frapps.xyz/proposals/0x4c85ddb6cd9da35f056ae2d7cb0667f4767677d65650b4b5ba4e0ffca1895078?txHash=0xa555c60cd134d8d22e62883ff6a1db1b0e1aa514ffb2d016c3f4a4091ffd06e9">Set periods</a><br>* <a href="https://eden.frapps.xyz/proposals/0xaee2f06697518bdb081abc85d098941580d74b0907c3ca30038a51c0e68f2c5b?txHash=0xd5a1d4ffd9ee6223470b8dd8012b017a15aee191dbc9cb03202885d7f4039a06">Set max live yes votes</a>');
  setDesc(133,'tp','Fractalgram','Fractalgram is core component of Eden Fractal and many other fractals. However we currently do not have a reliably working implementation of it. We should prioritize this problem because it&apos;s essential for user friendly experience in fractals.<br><br>We can use this topic to discuss existing tools and approaches to solving this problem.');
  setDesc(133,'tp','Eden Fractal 2026 Resolutions','<em>Original post:</em> <a href="https://t.me/edenfractal/5562/5959">https://t.me/edenfractal/5562/5959</a><br><br>As we embark on a new year and a new season, it’s worth taking some time to align on what we hope to accomplish. Eden Fractal is almost four years old, and while we&apos;ve made tremendous progress in developing fractal governance tools and processes, our core mission of implementing fractal decision-making throughout society remains a work in progress.<br><br>The new year brings new opportunities—blockchain and AI technologies are evolving rapidly, and Eden Fractal is positioned to play an increasingly important role in improving collective decision-making for communities everywhere. This topic invites participants to share thoughts on what we should prioritize this year, consider seting explicit community goals or &quot;New Year&apos;s resolutions,&quot; and how we can support each other in spreading fractal democracy more broadly.<br><br>This topic is intentionally open-ended. It&apos;s about setting intentions together as we navigate the year ahead. Of course, we can also discuss this topic in the coming weeks and months as well. I’m looking forward to hearing your thoughts and collaborating to grow fractals in 2026!');
  setDesc(133,'tp','Introduction to Fractal Circles','At this week&apos;s Eden Town Hall, we can have an introduction to the Fractal Circles project from Mikael, who has been developing fractal governance concepts for over 15 years. Mikael has expressed interest in demoing his Fractal Circle app with the Eden Fractal community and exploring ways to integrate it into the fractal ecosystem.<br><br>The Fractal Circle Bot is a collaborative decision-making tool that helps groups discuss ideas, evaluate proposals, and select representatives through multiple rounds of small-group discussion—all within Telegram. During this session, Mikael can introduce himself and the Fractal Circles project, share his perspective on fractal governance, and lead us through an interactive demo where we can test the app together.<br><br>This provides an opportunity for the Eden Fractal community to:<br><br>* Try a new fractal governance tool in action<br>* Explore potential synergies between Fractal Circles and Eden Fractal processes<br>* Provide feedback as governance practitioners<br>* Connect with Mikael and the Fractal Circles project after years of working on fractal governance innovation in parallel<br><br>Fractal Circles may provide complementary tooling that Eden Fractal could potentially adopt, and this demo could be valuable for any community implementing fractal decision-making processes. The demo could also support Mikael&apos;s ongoing development by providing a testing environment and feedback from experienced fractal governance enthusiasts. <br><br>You can learn more about Mikael&apos;s work at <a href="FractalCircles.org">FractalCircles.org</a> and explore the app in the <a href="https://fractalcircles.org/2026/01/07/fractal-circle-bot-manual/">Fractal Circles Bot Manual</a>.');
  setDesc(133,'tp','Optimism Fractal Hiatus','After over two years of consistent events, Optimism Fractal recently entered an indefinite strategic hiatus following a <a href="https://snapshot.org/#/s:optimismfractal.eth/proposal/0x8c29de1ec16e7393263ba1809139f45552cf890a078c9b09fcc9f5f104290e36">proposal</a> approved by the Optimism Fractal Council. This topic provides space for reflection on Optimism Fractal&apos;s journey and impact, as well as an opportunity to welcome Optimism Fractal community members who may be joining Eden Fractal for the first time.<br><br>Optimism Fractal made a profound impact on the Superchain, hosting 72 events (+40 more Optimism Town Hall events), facilitating hundreds of presentations about contributions to Optimism, and pioneering the testing of governance tools like ORDAO and Fractalgram on OP Mainnet. The community built lasting relationships among governance innovators and demonstrated how fractal democracy could support public goods funding on Ethereum Layer 2 networks. The decision to pause was strategic—consolidating resources to strengthen Eden Fractal&apos;s foundation and build the infrastructure that will benefit all future fractal communities.<br><br>This discussion is open to anyone who would like to share reflections on what Optimism Fractal meant to them, thoughts on where the fractal ecosystem goes from here, or simply to connect with fellow community members during this transition. We especially welcome friends from the Optimism Fractal community who are joining Eden Fractal and want to learn about how they can continue contributing to the fractal ecosystem.');
  setDesc(133,'tp','Continuing Discussions','Over the past several weeks of Synchronous Respect Trees and Town Halls, our community has proposed many valuable topics for discussion, and we have not yet had time to explore all of them in depth. This topic proposal suggests we could use part of our upcoming Town Hall to revisit and continue discussions on topics that received community interest but have not yet been fully addressed.<br><br>This can also serve as an opportunity to check in on any action items or follow-ups from previous discussions, see what progress has been made on ideas that were shared, and identify which topics warrant deeper exploration in future events. You can see the topics that were proposed for the most recent Eden Town Hall events in this <a href="https://snapshot.org/#/s:edenfractal.eth/proposal/0x3da213766fb092976c2d5ef29f6dd4ff76a492093263de4c6afb129abaef8bc8">snapshot poll</a>.');
  // Period 133 CRs
  setDesc(133,'cr','Non-profit','A non profit could help Eden Fractal by accepting donations and distributing funds to contributors. It is also part of a broader vision of creating a sustainable ecosystem for fractals. It is also part of the vision I expressed here: <a href="https://hackmd.io/@sim31/ef-vision-p132">https://hackmd.io/@sim31/ef-vision-p132</a>');
  setDesc(133,'cr','Documentation for ORDAO','Improve documentation for ORDAO and related tooling. Address concerns raised here: <a href="https://fractalnouns.notion.site/ORDAO-OREC-DOCUMENTATION-GAPS-2e6384a11f5680f5b524efc66f2d1a98">https://fractalnouns.notion.site/ORDAO-OREC-DOCUMENTATION-GAPS-2e6384a11f5680f5b524efc66f2d1a98</a>');
  setDesc(133,'cr','Fractalgram requirements','Fractalgram is core component of Eden Fractal and many other fractals. However we currently do not have a reliably working implementation of it. We should prioritize it because it&apos;s essential for user friendly experience in fractals.<br><br>This contribution request is about the first few steps - creating and then aligning on requirements specification. It makes sense to seek alignment, because this app has potential to be useful to both old and new iterations of fractals (if we design it the right way). Also it is an opportunity to experiment with <a href="https://github.com/github/spec-kit">Github Spec-kit</a>. Once we have specification using spec-kit, it should be straightforward to implement it.');
  setDesc(133,'cr','A game to guide discussion','While Synchronous Respect Trees effectively signal priority topics between meetings, they are insufficient for democratically controlling real-time meeting flow. This proposal requests creation of a simple game mechanism that would complement SRT by allowing participants to signal when to switch topics and prioritize discussions during meetings.<br><br><a href="https://hackmd.io/@sim31/meeting-ctrl-cr">Full problem statement and request</a>.');
  setDesc(133,'cr','Educational resource developmen','Eden Fractal needs better educational resources to help people understand what we&apos;re doing, how fractal decision-making processes work, and how they can benefit from participating. As we focus more intensively on strengthening Eden Fractal in 2026, this is an excellent opportunity to improve our documentation, create more accessible content, and develop comprehensive learning materials that serve both newcomers and experienced practitioners in the fractal ecosystem.<br><br>Contributions can include:<br><br>- <strong>Written Content:</strong> Articles, blog posts, and guides that explain fractal governance concepts and help people discover and understand our work.<br><br>- <strong>Technical Documentation:</strong> Specifications for our processes (such as the Eden+Fractal consensus process), implementation guides for Respect Games, and documentation of how our governance tools work—enabling other communities to learn from our approaches.<br><br>- <strong>Workflow Development:</strong> Exploring how AI tools can help us create and distribute educational content more effectively, and developing campaigns to share our best lessons with the right audiences.<br><br>- <strong>FAQ and Q&amp;A:</strong> Developing FAQ resources that answer common questions, and answering questions thoughtfully in our Telegram groups to help curious participants.<br><br>- <strong>Website Improvements:</strong> Making our website content clearer, more welcoming, and easier to navigate for newcomers.<br><br>- <strong>Video Content:</strong> Creating interviews with fractal community members, producing new introductory videos, editing existing recordings into focused clips, or improving the organization of our video library<br><br>The goal is to make it easier for newcomers to understand Eden Fractal&apos;s value proposition and for interested communities to learn how to implement fractal governance processes. While resources specifically about Eden Fractal&apos;s implementation are highest priority, educational content about fractal governance more broadly also supports our mission of implementing fractal decision-making processes throughout society.');
  setDesc(133,'cr','Tech development for gov tools','Eden Fractal relies on several core technical tools and welcomes contributions to their development and improvement. Contributions can range from direct improvements to our production tools—frontend development, smart contract work, user experience enhancements, testing and feedback—to building experimental applications that explore different approaches to fractal coordination. With AI-assisted development making it easier than ever to build applications, this is an exciting time to contribute to fractal governance infrastructure.<br><br>Priority development areas include:<br><br>- <strong>Fractalgram:</strong> The interface for playing Respect Games at live events—frontend improvements, voting functionality, user experience enhancements, and testing.<br><br>- <strong>ORDAO:</strong> On-chain governance infrastructure for democratic execution—smart contract improvements, frontend enhancements, and integration with other ecosystem tools.<br><br>- <strong>Eden+Fractal Process:</strong> Implementation improvements for our consensus process and better tooling support.<br><br>Additional valuable contributions:<br><br>- <strong>Experimental Applications:</strong> Building tools that explore different approaches to fractal coordination on various platforms—even when not directly adopted by Eden Fractal, these experiments generate insights that benefit the ecosystem.<br><br>- <strong>Infrastructure Improvements:</strong> Better organization of repositories, development processes, and tooling that helps other communities get started with fractal governance.<br><br>- <strong>Open Intents</strong> <strong>and EAS Integration:</strong> Enabling Eden Fractal&apos;s Respect tokens to be more composable with other communities and systems.<br><br>Different communities have different needs, and experimentation generates insights that can inform improvements to our own tools even when the results aren&apos;t directly adopted by Eden Fractal. Contributions that strengthen Eden Fractal&apos;s core tools are highest priority, but we also encourage innovation that advances fractal governance more broadly.');
  setDesc(133,'cr','Engagement and outreach','Eden Fractal thrives through active community engagement, and we&apos;re seeking contributions that help grow and strengthen our community. At this stage of development, we particularly value attracting contributors who can add significant value—talented builders, motivated leaders, researchers, and people who are genuinely interested in learning about and contributing to fractal governance. Quality matters more than quantity: inviting one highly engaged contributor often creates more value than attracting many passive observers.<br><br>Community engagement contributions include inviting people who would be strong fits for our community to join events, building relationships with potential collaborators in adjacent spaces, welcoming and onboarding new participants to help them feel at home, and retaining existing community members through meaningful interaction. Being a welcoming community member is itself a valuable contribution—when new participants join, helping them navigate our processes, answering their questions, and making them feel like they belong encourages continued engagement. Even nurturing relationships with people who may not be actively joining events but could become valuable contributors in the future creates foundations for collaboration.<br><br>This also includes outreach and relationship-building with complementary projects and communities in the governance innovation space. Whether it&apos;s reaching out to developers building similar tools, connecting with communities experimenting with democratic processes, or simply planting seeds with people who might contribute significantly in the future, these efforts strengthen the fractal ecosystem. Contributors who can work independently and bring their own initiative are especially valuable, though everyone will naturally have questions as they learn our processes—we welcome curious people who engage thoughtfully with the community.');
  setDesc(133,'cr','Research Fractal decision-making','Eden Fractal&apos;s mission includes collaborative research to advance our understanding of how communities can coordinate more effectively. Research contributions help us improve our existing processes, explore new possibilities, and share knowledge with the broader ecosystem. <br><br>Research contributions can include:<br><br>- <strong>Process Documentation:</strong> Studying how fractal governance processes work in practice, documenting patterns, and capturing what makes implementations effective.<br><br>- <strong>Practitioner Interviews:</strong> Interviewing community members and experienced practitioners to capture institutional knowledge and preserve lessons learned.<br><br>- <strong>Comparative Analysis:</strong> Exploring how other communities implement similar processes and synthesizing learnings from across the ecosystem.<br><br>- <strong>Innovation Research:</strong> Investigating novel approaches to coordination mechanisms, analyzing different game designs and consensus processes, and proposing improvements.<br><br>- <strong>Theoretical Engagement:</strong> Engaging deeply with existing literature and theory around fractal democracy, connecting academic work to practical implementation.<br><br>Research that examines what&apos;s working well, identifies areas for improvement, and proposes innovations helps Eden Fractal evolve. Newcomers bring fresh perspectives and can identify gaps in our materials and processes that experienced members might overlook, while experienced practitioners can direct research toward the most pressing needs and translate insights into practical improvements. <br><br>We encourage researchers to engage with the community, share their findings in discussions, and help translate insights into practical applications.');
  // Period 134 Topics
  setDesc(134,'tp','Update ORDAO configuration','Current configuration of Eden Fractal&apos;s ORDAO was meant to be temporary to allow old participants to claim their old respect before any contentious ORDAO proposals are executed. Current configuration is also becoming too limiting when we start passing more proposals per week.<br><br>I propose to make the these configuration changes: <a href="https://hackmd.io/@sim31/ef-ordao-config-update">https://hackmd.io/@sim31/ef-ordao-config-update</a><br><br>This will only take a moment to pass and then we can move on to the next topics.<br><br>I already made ordao proposals that would implement these changes in 18 days, assuming we don&apos;t cancel it before then:<br>* <a href="https://eden.frapps.xyz/proposals/0x4c85ddb6cd9da35f056ae2d7cb0667f4767677d65650b4b5ba4e0ffca1895078?txHash=0xa555c60cd134d8d22e62883ff6a1db1b0e1aa514ffb2d016c3f4a4091ffd06e9">Set periods</a><br>* <a href="https://eden.frapps.xyz/proposals/0xaee2f06697518bdb081abc85d098941580d74b0907c3ca30038a51c0e68f2c5b?txHash=0xd5a1d4ffd9ee6223470b8dd8012b017a15aee191dbc9cb03202885d7f4039a06">Set max live yes votes</a>');
  setDesc(134,'tp','More Equal Animals Anniversary','February 21st marks the five-year anniversary of the release of &quot;More Equal Animals: The Subtle Art of True Democracy&quot; by Daniel Larimer—the book that originally sparked the Eden community and laid the philosophical foundation for what we&apos;re building with fractal democracy.<br><br>More Equal Animals provided a blueprint for genuine democratic governance that resists centralization and empowers individuals through fractal structures. The principles in this book directly inspired the formation of Eden on EOS, which brought hundreds of participants together for revolutionary democratic elections, and subsequently inspired Fractally, the Genesis Fractal, Eden Fractal, and the entire fractal ecosystem that continues to grow today. Nearly five years later, our community is a living testament to the power of these ideas.<br><br>We could use this discussion to reflect on what More Equal Animals has meant to our community, share favorite insights from the book, and discuss how its principles continue to guide our work. I&apos;m also working on updated educational resources about More Equal Animals and the roots of Eden, including an article series that curates the rich library of educational content that many people may not be aware of. I encourage everyone to check out our article about <a href="https://edenfractal.com/blog/the-foundations-evolution-of-fractal-democracy-2021-2022">More Equal Animals and the Foundations of Eden</a> on the Eden Fractal blog for a deeper dive into these resources and the history that led to our community.<br><br>Whether you&apos;ve read the book cover to cover or are hearing about it for the first time, this is a wonderful opportunity to explore the ideas at the heart of what we&apos;re building together. The free e-book is available below for anyone who wants to read or listen to it before the event.');
  setDesc(134,'tp','Fractalgram dev discussions','<a href="https://optimystics.io/fractalgram">Fractalgram</a> has been a major topic of discussion over the past several weeks, and our community has been actively working to specify how the next generation of this essential tool should be built. As the primary interface for playing the Respect Game at our events, Fractalgram is central to Eden Fractal&apos;s operations and to the broader fractal ecosystem&apos;s ability to scale governance processes.<br><br>Recent discussions have covered a cross-platform architecture for Fractalgram, the specification-driven development approach using GitHub, platform priorities (with Telegram as a primary implementation), and how Fractalgram integrates with ORDAO and other governance infrastructure. There&apos;s still much to discuss and decide as we work toward the next version, and community input is valuable in shaping the direction of this tool.<br><br>This topic proposal suggests we continue these conversations at the upcoming Town Hall, providing space to share updates on development progress, discuss open questions about the specification, and ensure that community members have a voice in the direction of the tool that facilitates our core governance process. Whether you&apos;re a developer interested in contributing or a community member who uses Fractalgram regularly, your perspective matters for building the best tool possible.');
  setDesc(134,'tp','Eden Fractal 2026 Resolutions','Re-proposing this topic to continue our conversation about collective goals for 2026. <em>Original post:</em> <a href="https://t.me/edenfractal/5562/5959">https://t.me/edenfractal/5562/5959</a><br><br>As we embark on a new year and a new season, it’s worth taking some time to align on what we hope to accomplish. Eden Fractal is almost four years old, and while we&apos;ve made tremendous progress in developing fractal governance tools and processes, our core mission of implementing fractal decision-making throughout society remains a work in progress.<br><br>The new year brings new opportunities—blockchain and AI technologies are evolving rapidly, and Eden Fractal is positioned to play an increasingly important role in improving collective decision-making for communities everywhere. This topic invites participants to share thoughts on what we should prioritize this year, consider seting explicit community goals or &quot;New Year&apos;s resolutions,&quot; and how we can support each other in spreading fractal democracy more broadly.<br><br>This topic is intentionally open-ended. It&apos;s about setting intentions together as we navigate the year ahead. Of course, we can also discuss this topic in the coming weeks and months as well. I’m looking forward to hearing your thoughts and collaborating to grow fractals in 2026!');
  setDesc(134,'tp','Fractalgram','Fractalgram is core component of Eden Fractal and many other fractals. However we currently do not have a reliably working implementation of it. We should prioritize this problem because it&apos;s essential for user friendly experience in fractals.<br><br>We can use this topic to discuss existing tools and approaches to solving this problem.');
  setDesc(134,'tp','SRT V1 improvements','I think currently the biggest problem with our <a href="https://hackmd.io/@sim31/srt-1">current SRT game</a> is that lack of a clear score accumulation and reporting system.<br><br>It would be useful to have a page where people would be able to see all CRs that have been created (throughout say current season). This would especially be useful for new contributors. The analogous feature would also be useful for TPs. Relying on re-proposing all the CRs and TPs that are still relevant for every period will become to cumbersome.<br><br>Possible solution: create a toolchain that builds a report by processing results of last N SRT periods. That brings up a question of how to accumulate the scores of CR and TPs items? Probably some kind of decay mechanism would be desirable?<br><br>Another idea to explore: introduce contribution (Cs) items. Besides providing a systematic way to report contributions and connect them with CR, this could create a tool to subtract from CRs in accumulative score function (if a lot of people have voted on particular contribution, maybe that means that the corresponding CR is answered?).<br><br>This could also serve as time to express other feedback about SRT V1 and propose other improvements.');
  // Period 134 CRs
  setDesc(134,'cr','Educational resources','Eden Fractal needs better educational resources to help people understand what we&apos;re doing and how they can benefit from participating. Contributions can include writing articles and blog posts about fractal governance, developing FAQ resources, improving our website content, creating technical documentation and specifications, exploring AI-powered workflows for content creation, and producing video content. Resources about Eden Fractal&apos;s implementation are highest priority, but educational content about fractal governance broadly also supports our mission.<br><br>📖 <a href="https://www.notion.so/CR-Educational-Resource-Development-302074f5adac80a1ac57e94dffee4eb8?pvs=21">Read the full contribution request</a>');
  setDesc(134,'cr','Technical development','Eden Fractal relies on several core technical tools and welcomes contributions to their development. Priority areas include Fractalgram (the Respect Game interface), ORDAO (onchain governance infrastructure), the Eden+Fractal consensus process, and related tools or processes used by Eden Fractal. With AI-assisted development tools making it easier than ever to build applications, this is an exciting time to contribute—whether through direct improvements to our production tools or experimental applications that explore new <br>approaches to fractal coordination.<br><br>🛠️ <a href="https://www.notion.so/CR-Technical-Development-for-Fractal-Governance-Tools-302074f5adac800f86b2f9094faebbac?pvs=21">Read the full contribution request</a>');
  setDesc(134,'cr','Engagement and outreach','Eden Fractal thrives through active community engagement, and we&apos;re seeking contributions that help grow and strengthen our community. Quality matters more than quantity—inviting one highly engaged contributor often creates more value than attracting many passive observers. Contributions include inviting strong-fit people to join events, welcoming and onboarding new participants, building relationships with collaborators in adjacent spaces, and nurturing connections with potential future contributors.<br><br>🤝 <a href="https://www.notion.so/CR-Community-Engagement-and-Contributor-Outreach-302074f5adac80e383f4e788810b4820?pvs=21">Read the full contribution request</a>');
  setDesc(134,'cr','Fractal decision-making research','Eden Fractal&apos;s mission includes collaborative research to advance our understanding of how communities can coordinate more effectively. Research can include studying how fractal governance works in practice, interviewing experienced practitioners, exploring how other communities implement similar processes, investigating novel coordination mechanisms, and engaging deeply with existing literature and theory. Both newcomers with fresh perspectives and experienced practitioners who can identify the most impactful areas for investigation are welcome to contribute.<br><br>🔬 <a href="https://www.notion.so/CR-Research-into-Fractal-Decision-Making-Processes-302074f5adac80cb9ad1d3dad0084371?pvs=21">Read the full contribution request</a>');
  setDesc(134,'cr','Fractalgram','Fractalgram is core component of Eden Fractal and many other fractals. However we currently do not have a reliably working implementation of it. We should prioritize it because it&apos;s essential for user friendly experience in fractals.');
  setDesc(134,'cr','Non-profit for fractal ecosystem','A non profit could help Eden Fractal by accepting donations and distributing funds to contributors. It is also part of a broader vision of creating a sustainable ecosystem for fractals. It is also part of the vision I expressed here: <a href="https://hackmd.io/@sim31/ef-vision-p132">https://hackmd.io/@sim31/ef-vision-p132</a>');
  setDesc(134,'cr','Firmament','Firmament is an old project idea that has been floating around in Eden Fractal since last epoch.<br><br>My perspectives around how to achieve what I intended with Firmament, has changed dramatically, since I last talked about them in Eden Fractal.<br><br>The new project idea is much more simple and easier to deliver and could give Eden Fractal the following benefits:<br><br>⦁ Systematic way to integrate many different consensus building tools and select them from meeting to meeting<br>    ⦁ Would createa a space for different fractal app developers;<br>    ⦁ Would allow for different implementations of fractalgram (for example) to be tested;<br>⦁ A system to track and version governance documents effectively;<br>⦁ It would unite what we are currently calling legislative and executive branches into a single chain (human speed chain - 1 period - 1-2 blocks) secured by both old and new Eden Fractal Respect;<br>⦁ A way to market in a way that might be attractive to crypto people: concept of mining from a your laptop viable again;<br>⦁ A systematic way to integrate AI agents into our processes, without losing control;<br><br>I don&apos;t think that&apos;s all...<br><br>In general I think it can start the next generation of DAOs, which natively work at the level of abstraction <strong>fully</strong> understandable to all, not just smart contract developers. This development would be very aligned with where the whole tech world is going thanks to LLMs.<br><br>The initial contribution would be for me to express this new idea (document / post / prepare presentation).<br><br>Some (old and out of date) resources about firmament:<br>⦁ <a href="https://peakd.com/fractally/@sim31/fractal-blockchains">Article where the original idea was expressed</a><br>⦁ <a href="https://optimystics.io/firmament">Blog post about it by Dan Singjoy, with more resources</a>');
  // Period 135 Topics
  setDesc(135,'tp','Update ORDAO configuration','Current configuration of Eden Fractal&apos;s ORDAO was meant to be temporary to allow old participants to claim their old respect before any contentious ORDAO proposals are executed. Current configuration is also becoming too limiting when we start passing more proposals per week.<br><br>I propose to make the these configuration changes: <a href="https://hackmd.io/@sim31/ef-ordao-config-update">https://hackmd.io/@sim31/ef-ordao-config-update</a><br><br>This will only take a moment to pass and then we can move on to the next topics.<br><br>I already made ordao proposals that would implement these changes in 18 days, assuming we don&apos;t cancel it before then:<br>* <a href="https://ef.frapps.xyz/proposals/0x73bc8a57f340af35b4f0416f53a73734b773b0ed281d11c618aee2ab1cdb061f?txHash=0x67b5485c53e97f412f7ed44ef70ac9aa1f078a20475eb22d8694dfc07c9c738c">Set periods</a><br>* <a href="https://ef.frapps.xyz/proposals/0xd907c1f53c66530bcc9544c3fd77b948f32781fb6ed8161832a3747e14d0f199?txHash=0x70d9fd140f5bb3be5e93c097692ed4ea3b0e9a55414ffe42813e630ddd6d0f91">Set max live yes votes</a>');
  setDesc(135,'tp','SRT V1 improvements/feedback','We&apos;ve already started discussing this in <a href="https://youtu.be/Vo8k91wwA9g?t=605">Eden Town Hall 72</a>.<br><br><a href="https://t.me/edenfractal/5562/6201">Relevant topic from previous period</a> introduces some of the problems and potential solutions.<br><br>Some new key ideas I took away since our last discussions:<br><br>⦁ <a href="https://hackmd.io/@sim31/srt-v1-impr-p135#1-Use-SRT-V1-as-flat-issue-tracker-instead-of-as-a-tree">1. Use SRT V1 as flat issue tracker instead of as a tree?</a><br><br>⦁ <a href="https://hackmd.io/@sim31/srt-v1-impr-p135#2-Contribution-Requests-and-Contributions-are-one-and-the-same">2. Contribution Requests and Contributions are one and the same?</a>');
  setDesc(135,'tp','2026 Resolutions and Break Plans','<strong>Eden Fractal 2026 Resolutions</strong><br>Original post: <a href="https://t.me/edenfractal/5562/5959">https://t.me/edenfractal/5562/5959</a><br><br>As we embark on a new year and a new season, it’s worth taking some time to align on what we hope to accomplish. Eden Fractal is almost four years old, and while we&apos;ve made tremendous progress in developing fractal governance tools and processes, our core mission of implementing fractal decision-making throughout society remains a work in progress.<br><br>The new year brings new opportunities—blockchain and AI technologies are evolving rapidly, and Eden Fractal is positioned to play an increasingly important role in improving collective decision-making for communities everywhere. This topic invites participants to share thoughts on what we should prioritize this year, consider seting explicit community goals or &quot;New Year&apos;s resolutions,&quot; and how we can support each other in spreading fractal democracy more broadly.<br><br>This topic is intentionally open-ended. It&apos;s about setting intentions together as we navigate the year ahead. Of course, we can also discuss this topic in the coming weeks and months as well. I’m looking forward to hearing your thoughts and collaborating to grow fractals in 2026!<br><br><strong>Break Planning &amp; Daylight Saving Time</strong><br>We&apos;re on the 7th week of events this season, heading into the 4th Respect Game, with the 5th Respect Game of the season on March 12 and the 6th on March 26. Traditionally, we do about 12 weeks of events before taking a mid-season break, so as currently scheduled, a break would come around the end of March.<br><br>This is a good time to start discussing the timing and duration of that break - whether to follow the traditional schedule, or perhaps whether it would be better to take the break a bit earlier to focus on infrastructure improvements and preparation for the second half of the season. We&apos;d also want to determine how long the break should be.<br><br>Also worth considering: US daylight saving time begins on March 8 (clocks move forward one hour), and Europe&apos;s summer time begins on March 29. Between March 9 and March 28, the time difference between the US and Europe temporarily shifts by one hour. For our events scheduled at a fixed UTC time, this means European participants may find the event falls one hour later in their local time after March 29 than it did before. We can discuss whether any schedule adjustments make sense.');
  setDesc(135,'tp','Fractalgram','<em>Original post: </em><a href="https://t.me/edenfractal/5562/6193">https://t.me/edenfractal/5562/6193</a><br><br>Fractalgram has been a major topic of discussion over the past several weeks, and our community has been actively working to specify how the next generation of this essential tool should be built. As the primary interface for playing the Respect Game at our events, Fractalgram is central to Eden Fractal&apos;s operations and to the broader fractal ecosystem&apos;s ability to scale governance processes.<br><br>Recent discussions have covered a cross-platform architecture for Fractalgram, the specification-driven development approach using GitHub, platform priorities (with Telegram as a primary implementation), and how Fractalgram integrates with ORDAO and other governance infrastructure. There&apos;s still much to discuss and decide as we work toward the next version, and community input is valuable in shaping the direction of this tool.<br><br>This topic proposal suggests we continue these conversations at the upcoming Town Hall, providing space to share updates on development progress, discuss open questions about the specification, and ensure that community members have a voice in the direction of the tool that facilitates our core governance process. Whether you&apos;re a developer interested in contributing or a community member who uses Fractalgram regularly, your perspective matters for building the best tool possible.');
  setDesc(135,'tp','Eden Fractal Intent Document','Eden Fractal needs its own Intent Document, envisioned as an operating manual for community coordination that clearly defines technical specifications, governance processes, and community expectations. <a href="https://optimismfractal.com/details">Optimism Fractal&apos;s Intent Document</a> provides a strong starting point — it covers Respect Game meeting structure, distribution amounts, the consensus process, council formation, the executive contract, and more, and has been updated multiple times through their community&apos;s own consensus process as the community evolved.<br><br>As a first step, we can use Optimism Fractal&apos;s document as a foundation and then decide what should be tailored to Eden Fractal&apos;s unique structure and Epoch 2 operations. The document would be drafted through community collaboration, approved via our consensus process, and include mechanisms for future modifications. This would be a valuable topic to discuss at our upcoming town hall as we consider the scope, structure, and approach.');
  setDesc(135,'tp','Eden Fractal Community Agreement','Creating a community agreement has been one of our outstanding goals for years, and it&apos;s becoming increasingly important as we work toward scaling our processes in the new year. A clear agreement helps set expectations, protect the community, and provide a foundation for scaling — including making it clear that Respect tokens represent community opinions, establishing consent for video recording and content sharing, and defining governance participation expectations.<br><br>We&apos;ve discussed this extensively over the years, including detailed conversations during <a href="https://youtu.be/_a-SbzL5_xY?t=4617">Eden Fractal event 37</a> and <a href="https://edenfractal.com/38">38</a> and in related communities. We now have a legislative consensus process through Eden+Fractal to formally approve such an agreement, which removes a key blocker. I&apos;m working on resources to help us coordinate on this, and this is a great topic for the community to start discussing. The agreement could potentially be stored in Firmament on GitHub as a communally approved document. This is a topic worth discussing at our upcoming town hall as we consider scope, priorities, and next steps.');
  setDesc(135,'tp','Recognizing Prior Contributions','Eden Fractal did not distribute Respect tokens between approximately events 63 and 120, which represents roughly a third to 40% of our total 135 events. This is a significant gap given that recognizing contributions is one of our core functions.<br><br>There are two distinct periods to consider. For events 63–83, Respect Games were played and consensus results were posted on EOS, but tokens were never distributed due to issues with the Eden Fractal MSIG. Records exist in video timestamps, consensus results posts, and onchain transaction history. For events 83–120, no Respect Games were played, but many people contributed significantly during this pivotal time for fractal governance development and received no Eden Fractal Respect.<br><br>Currently, the ORDAO account is controlled primarily by participants from Eden Fractal&apos;s first year and a half, with no recognition for contributions from approximately year 2 through year 3. One idea I&apos;m exploring is using an AI agent to review the un-executed proposals on EOS, videos from events with no respect games, and generate attendance records to help inform retroactive Respect distribution proposals. I have some <a href="https://www.notion.so/Respect-Distribution-Considerations-for-Epoch-2-1fb074f5adac80a8aceccfa41773804d?pvs=21">draft notes</a> about this and am working on a more detailed article.<br><br>While discussing contributions to Eden Fractal directly, we could also begin considering higher-order fractal considerations — how Eden Fractal might recognize contributions from communities like Genesis Fractal, Eden on EOS, Optimism Fractal, ZAO Fractal, and others who have supported our mission. The priority should be recognizing direct contributions to Eden Fractal first, and then considering how to best recognize contributions from other fractals.<br><br>I&apos;d welcome any thoughts or feedback from delegates and community members on the best approach.');
  setDesc(135,'tp','Exploring Matrix.org','I&apos;ve been learning about <a href="https://matrix.org/">Matrix</a> over the past week and wanted to share some of what I&apos;ve found. Matrix is an open-source, decentralized communication protocol that can do similar things to Telegram or Discord, but it aligns more closely with Eden Fractal&apos;s values around openness, decentralization, and composability — meaning we can build with it and on top of it.<br><br>A few things that stand out: Matrix has a <a href="https://spec.matrix.org/">spec-driven development process</a> with a governance and proposal system on GitHub that could serve as useful inspiration as we start using spec-driven development ourselves. They also have both a federated version and are building Matrix P2P, a non-federated peer-to-peer version that shares some of the same goals that Dan Larimer&apos;s team had with Clarion OS. The project has been in active development for over 10 years and continues to evolve.<br><br>I think there are potential opportunities for us to use their tools, learn from their processes, and possibly collaborate. I&apos;d like to share what I&apos;ve learned and have an interactive conversation about it. You can learn more about Matrix in this <a href="https://www.youtube.com/watch?v=-Keu8aE8t08">video</a> showcasing their latest updates.');
  setDesc(135,'tp','Eden+Fractal Improvements','<a href="https://edenfractal.com/plus">Eden+Fractal</a> is our legislative consensus process for choosing delegates, deliberating on decisions, and making community decisions. The process was first introduced around Eden Fractal&apos;s 20th event back in 2022, and we&apos;ve been practicing it consistently for the past six months during Epoch 2. It&apos;s been working well overall, but there are clear areas for improvement. Delegate attendance has been a challenge, and our current tooling is basically an article and a Google spreadsheet. Recent discussions about Firmament and Respect Trees may also relate to potential improvements.');
  // Period 135 CRs
  setDesc(135,'cr','Firmament','Firmament is an old project idea that has been floating around in Eden Fractal since last epoch.<br><br>My perspectives around how to achieve what I intended with Firmament, has changed dramatically, since I last talked about them in Eden Fractal.<br><br>The new project idea is much more simple and easier to deliver and could give Eden Fractal the following benefits:<br><br>⦁ Systematic way to integrate many different consensus building tools and select them from meeting to meeting<br>    ⦁ Would createa a space for different fractal app developers;<br>    ⦁ Would allow for different implementations of fractalgram (for example) to be tested;<br>⦁ A system to track and version governance documents effectively;<br>⦁ It would unite what we are currently calling legislative and executive branches into a single chain (human speed chain - 1 period - 1-2 blocks) secured by both old and new Eden Fractal Respect;<br>⦁ A way to market in a way that might be attractive to crypto people: concept of mining from a your laptop viable again;<br>⦁ A systematic way to integrate AI agents into our processes, without losing control;<br><br>I don&apos;t think that&apos;s all...<br><br>In general I think it can start the next generation of DAOs, which natively work at the level of abstraction <strong>fully</strong> understandable to all, not just smart contract developers. This development would be very aligned with where the whole tech world is going thanks to LLMs.<br><br>Some (old and out of date) resources about firmament:<br>⦁ <a href="https://peakd.com/fractally/@sim31/fractal-blockchains">Article where the original idea was expressed</a><br>⦁ <a href="https://optimystics.io/firmament">Blog post about it by Dan Singjoy, with more resources</a>');
  setDesc(135,'cr','Non-profit for fractal ecosystem','A non profit could help Eden Fractal by accepting donations and distributing funds to contributors. It is also part of a broader vision of creating a sustainable ecosystem for fractals. It is also part of the vision I expressed here: <a href="https://hackmd.io/@sim31/ef-vision-p132">https://hackmd.io/@sim31/ef-vision-p132</a>');
  setDesc(135,'cr','Quicker uploads of videos','From what I&apos;ve observed meeting recordings <a href="https://www.youtube.com/@EdenCreators/videos">uploaded to EdenCreators</a> lag by about 1 week or more.<br><br>More immediate availability of recordings would have the benefit that people who weren&apos;t able to participate could catch up immediately (say the next day).<br><br>In general, community could stay more in-sync even if not everyone is participating in meetings.<br><br>This would also be useful for people who were in the meeting and want to reference something that was discussed / said in the meeting, in the chats after the meeting.<br><br>This would also help secure state transitions of Eden Fractal. E.g.: in ORDAO it normally takes 6 days for respect distribution proposal to pass after the respect game event. A recording is one of the pieces of evidence respect-holders can use to verify respect distribution proposals to make an informed vote.<br><br>Maybe livestream would be an option and an easy way to avoid production overhead?');
  setDesc(135,'cr','Fractalgram','Fractalgram is core component of Eden Fractal and many other fractals, however the current implementations have a lot of room for improvement.<br><br><a href="https://t.me/edenfractal/1/6226">The old fractalgram is fixed</a> but it is far from being the app we want to introduce newcomers to.<br><br>We&apos;ve already started discussing design of new fractalgram app:<br>⦁ <a href="https://hackmd.io/@sim31/fractalgram2-design-1">Fractalgram Design Principles. Part 1</a>;<br>⦁ <a href="https://youtu.be/IEpsX-8ZTMA">Discussion in Eden Town Hall</a><br>⦁ <a href="https://james-mart.medium.com/fractal-governance-a-shared-submission-algorithm-311a3039b219">Discussion on related designs in Medium (see comments)</a><br>⦁ <a href="https://www.youtube.com/watch?v=SMkPXd-1B_g">Discussion on the process to develop fractalgram / spec-driven development</a>');
  setDesc(135,'cr','Solve denial of respect distribution','This is a technical issue that requires some development work in ORDAO.<br><br>All the details here: <a href="https://github.com/sim31/ordao/issues/27">https://github.com/sim31/ordao/issues/27</a> .');
  setDesc(135,'cr','Eden Fractal Community Agreement','Eden Fractal needs a community agreement that establishes clear expectations and protections for participants. This has been an outstanding goal since our early days and is becoming increasingly important as we prepare to scale our processes.<br><br>Contributions can include researching prior agreement discussions and materials from Eden Fractal, Genesis Fractal, and related communities; drafting agreement terms covering video consent, governance participation, content rights, and the nature of Respect as an opinion token; exploring integration with tools like Hats Protocol for onchain agreement signing and role-based access; and helping to organize and curate all existing resources about this topic into one accessible place.<br><br>I&apos;m currently working on resources to make coordination easier, and contributions to this effort are very welcome. You can see some of our prior discussions about agreements at <a href="https://edencreators.com/agreement">EdenCreators.com/agreement</a>.');
  setDesc(135,'cr','Eden Fractal Intent Document','Eden Fractal needs its own Intent Document, envisioned as an operating manual for community coordination that clearly defines technical specifications, governance processes, and community expectations. <a href="https://optimismfractal.com/details">Optimism Fractal&apos;s Intent Document</a> provides a strong starting point — it covers Respect Game meeting structure, distribution amounts, the consensus process, council formation, the executive contract, and more, and has been updated multiple times through their community&apos;s own consensus process as the community evolved.<br><br>As a first step, we can use Optimism Fractal&apos;s document as a foundation and then decide what should be tailored to Eden Fractal&apos;s unique structure and Epoch 2 operations. The document would be drafted through community collaboration, approved via our consensus process, and include mechanisms for future modifications. This would be a valuable topic to discuss at our upcoming town hall as we consider the scope, structure, and approach.');
  setDesc(135,'cr','Educational Resources','Eden Fractal needs better educational resources to help people understand what we&apos;re doing and how they can benefit from participating. Contributions can include writing articles and blog posts about fractal governance, developing FAQ resources, improving our website content, creating technical documentation and specifications, exploring AI-powered workflows for content creation, and producing video content. Resources about Eden Fractal&apos;s implementation are highest priority, but educational content about fractal governance broadly also supports our mission.<br><br>📖 <a href="https://www.notion.so/CR-Educational-Resource-Development-302074f5adac80a1ac57e94dffee4eb8?pvs=21">Read the full contribution request</a>');
  setDesc(135,'cr','Community Engagement','Eden Fractal thrives through active community engagement, and we&apos;re seeking contributions that help grow and strengthen our community. Quality matters more than quantity—inviting one highly engaged contributor often creates more value than attracting many passive observers. Contributions include inviting strong-fit people to join events, welcoming and onboarding new participants, building relationships with collaborators in adjacent spaces, and nurturing connections with potential future contributors.<br><br>🤝 <a href="https://www.notion.so/CR-Community-Engagement-and-Contributor-Outreach-302074f5adac80e383f4e788810b4820?pvs=21">Read the full contribution request</a>');
  setDesc(135,'cr','Fractal Research','Eden Fractal&apos;s mission includes collaborative research to advance our understanding of how communities can coordinate more effectively. Research can include studying how fractal governance works in practice, interviewing experienced practitioners, exploring how other communities implement similar processes, investigating novel coordination mechanisms, and engaging deeply with existing literature and theory. Both newcomers with fresh perspectives and experienced practitioners who can identify the most impactful areas for investigation are welcome to contribute.<br><br>🔬 <a href="https://www.notion.so/CR-Research-into-Fractal-Decision-Making-Processes-302074f5adac80cb9ad1d3dad0084371?pvs=21">Read the full contribution request</a>');

    // ── Compute cumulative scores ─────────────────────────────────────────────
  function buildCumulativeTable(type) {
    const descType = type === 'topics' ? 'tp' : 'cr';
    const rows = [];
    const nameMap = new Map();

    for (const p of DATA.periods) {
      const poll = p[type];
      for (const c of poll.choices) {
        if (!nameMap.has(c.name)) {
          nameMap.set(c.name, rows.length);
          rows.push({
            name: c.name,
            proposer: c.proposer,
            periodScores: {},
            cumulative: 0,
            descs: {} // period -> description
          });
        }
        const idx = nameMap.get(c.name);
        const weighted = c.score * p.decayWeight;
        rows[idx].periodScores[p.period] = { raw: c.score, weighted, votes: poll.votes };
        rows[idx].cumulative += weighted;
        const d = getDesc(p.period, descType, c.name);
        if (d) rows[idx].descs[p.period] = d;
      }
    }

    rows.sort((a, b) => b.cumulative - a.cumulative);
    return rows;
  }

  let descIdCounter = 0;
  function nextDescId() { return 'desc-' + (descIdCounter++); }

  // ── Rendering helpers ─────────────────────────────────────────────────────
  function fmt(n) { return n.toFixed(2); }

  function renderBar(value, maxValue) {
    const pct = maxValue > 0 ? (value / maxValue) * 100 : 0;
    return `<div class="w-full bg-gray-100 rounded-full h-2.5 mt-1">
      <div class="decay-bar bg-indigo-500 h-2.5 rounded-full" style="width: ${pct.toFixed(1)}%"></div>
    </div>`;
  }

  function renderPeriodBadge(period) {
    const colors = { 133: 'bg-amber-100 text-amber-800', 134: 'bg-sky-100 text-sky-800', 135: 'bg-emerald-100 text-emerald-800' };
    return `<span class="inline-block text-xs font-medium px-2 py-0.5 rounded ${colors[period] || 'bg-gray-100'}">P${period}</span>`;
  }

  function renderSection(title, type) {
    const rows = buildCumulativeTable(type);
    if (rows.length === 0) return '';

    const maxCum = rows[0].cumulative;
    const periods = DATA.meta.periodsIncluded;

    let periodHeaders = periods.map(p =>
      `<th class="px-3 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">P${p}<br><span class="text-[10px] normal-case text-gray-400">×${DATA.periods.find(d => d.period === p).decayWeight}</span></th>`
    ).join('');

    const colCount = 3 + periods.length;

    let tableRows = rows.map((r, i) => {
      const rank = i + 1;
      const id = nextDescId();
      const periodCells = periods.map(p => {
        const ps = r.periodScores[p];
        if (!ps) return `<td class="px-3 py-3 text-right text-gray-300 score-cell">—</td>`;
        return `<td class="px-3 py-3 text-right score-cell">
          <span class="text-gray-800 font-medium">${fmt(ps.weighted)}</span>
          <br><span class="text-xs text-gray-400">${fmt(ps.raw)} raw</span>
        </td>`;
      }).join('');

      const periodsPresent = periods.filter(p => r.periodScores[p]).map(renderPeriodBadge).join(' ');

      // Build description content: show most recent period's description, with tabs if multiple
      const descPeriods = Object.keys(r.descs).map(Number).sort((a, b) => b - a);
      let descHtml = '';
      if (descPeriods.length > 0) {
        if (descPeriods.length === 1) {
          descHtml = `<div class="desc-content text-sm text-gray-600 leading-relaxed">${r.descs[descPeriods[0]]}</div>`;
        } else {
          const tabsId = id + '-tabs';
          descHtml = `
            <div class="mb-2 flex gap-1 flex-wrap">${descPeriods.map((p, ti) =>
              `<button onclick="event.stopPropagation(); switchDescTab('${tabsId}', ${p})" class="desc-tab-btn px-2.5 py-1 text-xs rounded font-medium transition-colors ${ti === 0 ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}" data-tabgroup="${tabsId}" data-period="${p}">P${p}</button>`
            ).join('')}</div>
            ${descPeriods.map((p, ti) =>
              `<div class="desc-content desc-tab-panel text-sm text-gray-600 leading-relaxed ${ti === 0 ? '' : 'hidden'}" data-tabgroup="${tabsId}" data-period="${p}">${r.descs[p]}</div>`
            ).join('')}
          `;
        }
      }

      return `<tr class="cursor-pointer hover:bg-indigo-50/40 transition-colors ${rank % 2 === 0 ? 'bg-gray-50/50' : ''}" onclick="toggleDesc('${id}')">
        <td class="px-3 py-3 text-center text-gray-400 font-medium">${rank}</td>
        <td class="px-3 py-3">
          <div class="font-medium text-gray-900 flex items-center gap-1.5">
            <span class="text-indigo-400 text-[10px] desc-arrow" id="${id}-arrow">▶</span>
            ${r.name}
          </div>
          <div class="text-xs text-gray-400 mt-0.5 ml-4">${r.proposer} · ${periodsPresent}</div>
        </td>
        <td class="px-4 py-3 text-right score-cell">
          <span class="text-lg font-semibold text-indigo-700">${fmt(r.cumulative)}</span>
          ${renderBar(r.cumulative, maxCum)}
        </td>
        ${periodCells}
      </tr>
      <tr id="${id}" class="hidden">
        <td colspan="${colCount}" class="px-6 py-4 bg-indigo-50/30 border-b border-indigo-100">
          ${descHtml || '<span class="text-sm text-gray-400 italic">No description available.</span>'}
        </td>
      </tr>`;
    }).join('');

    // Per-period detail
    let periodDetails = DATA.periods.map(p => {
      const poll = p[type];
      const sorted = [...poll.choices].sort((a, b) => b.score - a.score);
      const maxScore = sorted[0]?.score || 1;
      const descType = type === 'topics' ? 'tp' : 'cr';
      const choiceRows = sorted.map((c, i) => {
        const did = nextDescId();
        const d = getDesc(p.period, descType, c.name);
        return `
        <tr class="cursor-pointer hover:bg-indigo-50/30 transition-colors ${i % 2 === 0 ? '' : 'bg-gray-50/50'}" onclick="toggleDesc('${did}')">
          <td class="px-3 py-2 text-center text-gray-400 text-sm">${i + 1}</td>
          <td class="px-3 py-2 text-sm">
            <span class="text-indigo-400 text-[10px] desc-arrow" id="${did}-arrow">▶</span>
            ${c.name} <span class="text-gray-400 text-xs">— ${c.proposer}</span>
          </td>
          <td class="px-3 py-2 text-right text-sm font-medium score-cell">${fmt(c.score)}</td>
          <td class="px-3 py-2 w-32">
            <div class="w-full bg-gray-100 rounded-full h-2">
              <div class="bg-indigo-400 h-2 rounded-full" style="width: ${(c.score / maxScore * 100).toFixed(1)}%"></div>
            </div>
          </td>
        </tr>
        <tr id="${did}" class="hidden">
          <td colspan="4" class="px-6 py-3 bg-indigo-50/20 border-b border-indigo-50">
            <div class="desc-content text-sm text-gray-600 leading-relaxed">${d || '<span class="italic text-gray-400">No description available.</span>'}</div>
          </td>
        </tr>`;
      }).join('');

      // Missing items for this period
      let missingHtml = '';
      if (p.missingItems) {
        const relevant = p.missingItems.filter(m => m.type === (type === 'topics' ? 'tp' : 'cr'));
        if (relevant.length > 0) {
          missingHtml = relevant.map(m => `
            <div class="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-800">
              <strong>⚠ Missing:</strong> "${m.name}" (by ${m.proposer}) — ${m.reason}
            </div>
          `).join('');
        }
      }

      return `
        <details class="border border-gray-200 rounded-lg overflow-hidden">
          <summary class="px-4 py-3 bg-white hover:bg-gray-50 font-medium text-sm">
            Period ${p.period}
            <span class="text-gray-400 font-normal ml-2">${p.dates.stage1Start} → ${p.dates.stage2End} · ${poll.votes} voter${poll.votes !== 1 ? 's' : ''} · Total: ${fmt(poll.scoresTotal)}</span>
            <a href="${poll.snapshotUrl}" target="_blank" rel="noopener" class="ml-2 text-indigo-500 hover:text-indigo-700 text-xs">[Snapshot ↗]</a>
          </summary>
          <div class="px-2 py-2">
            <table class="w-full">
              <thead><tr class="border-b border-gray-100">
                <th class="px-3 py-2 text-left text-xs text-gray-400 w-10">#</th>
                <th class="px-3 py-2 text-left text-xs text-gray-400">Proposal</th>
                <th class="px-3 py-2 text-right text-xs text-gray-400">Score</th>
                <th class="px-3 py-2 text-xs text-gray-400 w-32"></th>
              </tr></thead>
              <tbody>${choiceRows}</tbody>
            </table>
            ${missingHtml}
          </div>
        </details>
      `;
    }).join('');

    return `
      <section class="mb-12">
        <h2 class="text-2xl font-bold text-gray-900 mb-1">${title}</h2>
        <p class="text-sm text-gray-500 mb-5">Cumulative scores across periods 133–135, weighted by exponential decay (λ = ${DATA.meta.decayFactor}). <span class="text-gray-400">Click any row to see full description.</span></p>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="border-b border-gray-200 bg-gray-50/80">
                  <th class="px-3 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider w-12">#</th>
                  <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Proposal</th>
                  <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider w-40">Cumulative</th>
                  ${periodHeaders}
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">${tableRows}</tbody>
            </table>
          </div>
        </div>

        <h3 class="text-lg font-semibold text-gray-700 mb-3">Per-Period Breakdown</h3>
        <div class="space-y-2">${periodDetails}</div>
      </section>
    `;
  }

  // ── Toggle / Tab logic ─────────────────────────────────────────────────────
  function toggleDesc(id) {
    const row = document.getElementById(id);
    const arrow = document.getElementById(id + '-arrow');
    if (!row) return;
    const isHidden = row.classList.contains('hidden');
    row.classList.toggle('hidden');
    if (arrow) arrow.textContent = isHidden ? '▼' : '▶';
  }

  function switchDescTab(tabGroupId, period) {
    document.querySelectorAll(`.desc-tab-btn[data-tabgroup="${tabGroupId}"]`).forEach(btn => {
      const active = Number(btn.dataset.period) === period;
      btn.className = btn.className.replace(/bg-\S+/g, '').replace(/text-\S+/g, '').trim();
      btn.classList.add('desc-tab-btn', 'px-2.5', 'py-1', 'text-xs', 'rounded', 'font-medium', 'transition-colors');
      if (active) { btn.classList.add('bg-indigo-100', 'text-indigo-700'); }
      else { btn.classList.add('bg-gray-100', 'text-gray-500', 'hover:bg-gray-200'); }
    });
    document.querySelectorAll(`.desc-tab-panel[data-tabgroup="${tabGroupId}"]`).forEach(panel => {
      panel.classList.toggle('hidden', Number(panel.dataset.period) !== period);
    });
  }

  // ── Render ────────────────────────────────────────────────────────────────
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="mb-8 p-5 bg-white rounded-xl shadow-sm border border-gray-200">
      <h2 class="text-lg font-semibold text-gray-800 mb-2">About this report</h2>
      <p class="text-sm text-gray-600 mb-3">
        This report aggregates results from 3 sessions of the
        <a href="https://hackmd.io/@sim31/srt-1" class="text-indigo-600 hover:underline" target="_blank">Synchronous Respect Trees V1</a>
        game played by the Eden Fractal community. Each session produces two polls on
        <a href="https://snapshot.box/#/s:edenfractal.eth" class="text-indigo-600 hover:underline" target="_blank">Snapshot</a>:
        one for <strong>Topic Proposals (TPs)</strong> and one for <strong>Contribution Requests (CRs)</strong>.
      </p>
      <div class="flex flex-wrap gap-4 text-sm">
        <div class="flex items-center gap-2">
          <span class="inline-block w-3 h-3 rounded-full bg-amber-300"></span>
          <span><strong>Period 133</strong> — weight ×0.25</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="inline-block w-3 h-3 rounded-full bg-sky-400"></span>
          <span><strong>Period 134</strong> — weight ×0.50</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="inline-block w-3 h-3 rounded-full bg-emerald-500"></span>
          <span><strong>Period 135</strong> — weight ×1.00</span>
        </div>
      </div>
    </div>

    ${renderSection('Topic Proposals', 'topics')}
    ${renderSection('Contribution Requests', 'crs')}

    <footer class="mt-12 pt-8 border-t border-gray-200 text-sm text-gray-500 space-y-4 pb-12">
      <div>
        <h3 class="font-semibold text-gray-700 mb-1">Methodology</h3>
        <p>
          Scores are accumulated using an <strong>exponential decay</strong> function on raw (un-normalized) scores.
          The formula is: <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">cumulative = Σ (raw_score × λ<sup>(N−i)</sup>)</code>
          where <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">λ = ${DATA.meta.decayFactor}</code>,
          <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">N = 2</code> (index of most recent period),
          and <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">i</code> is the period index (0, 1, 2).
          This means the most recent period has full weight (×1), the previous period is halved (×0.5), and the oldest is quartered (×0.25).
          Periods with more voters naturally contribute more to the cumulative score (no normalization is applied).
        </p>
      </div>
      <div>
        <h3 class="font-semibold text-gray-700 mb-1">Snapshot Poll Links</h3>
        <ul class="space-y-1">
          ${DATA.periods.map(p => `
            <li>
              <strong>Period ${p.period}:</strong>
              <a href="${p.topics.snapshotUrl}" target="_blank" class="text-indigo-600 hover:underline">Topics ↗</a> ·
              <a href="${p.crs.snapshotUrl}" target="_blank" class="text-indigo-600 hover:underline">CRs ↗</a>
            </li>
          `).join('')}
        </ul>
      </div>
      <p class="text-xs text-gray-400">
        Generated on 2026-03-05. Game rules:
        <a href="https://hackmd.io/@sim31/srt-1" class="text-indigo-500 hover:underline" target="_blank">SRT V1</a>.
      </p>
    </footer>
  `;
  </script>
</body>
</html>
