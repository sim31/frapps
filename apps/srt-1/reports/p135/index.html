  setDesc(133,'tp','Update ORDAO configuration','Current configuration of Eden Fractal\'s ORDAO was meant to be temporary to allow old participants to claim their old respect before any contentious ORDAO proposals are executed. Current configuration is also becoming too limiting when we start passing more proposals per week.<br><br>I propose to make these configuration changes: <a href="https://hackmd.io/@sim31/ef-ordao-config-update" class="text-indigo-600 hover:underline" target="_blank">hackmd.io/@sim31/ef-ordao-config-update</a><br><br>ORDAO proposals: <a href="https://eden.frapps.xyz/proposals/0x4c85ddb6cd9da35f056ae2d7cb0667f4767677d65650b4b5ba4e0ffca1895078" class="text-indigo-600 hover:underline" target="_blank">Set periods</a> · <a href="https://eden.frapps.xyz/proposals/0xaee2f06697518bdb081abc85d098941580d74b0907c3ca30038a51c0e68f2c5b" class="text-indigo-600 hover:underline" target="_blank">Set max live yes votes</a>');
  setDesc(133,'tp','Fractalgram','Fractalgram is core component of Eden Fractal and many other fractals. However we currently do not have a reliably working implementation of it. We should prioritize this problem because it\'s essential for user friendly experience in fractals. We can use this topic to discuss existing tools and approaches to solving this problem.');
  setDesc(133,'tp','Eden Fractal 2026 Resolutions','As we embark on a new year and a new season, it\'s worth taking some time to align on what we hope to accomplish. Eden Fractal is almost four years old. The new year brings new opportunities — blockchain and AI technologies are evolving rapidly, and Eden Fractal is positioned to play an increasingly important role in improving collective decision-making. This topic invites participants to share thoughts on what we should prioritize this year and how we can support each other in spreading fractal democracy more broadly.');
  setDesc(133,'tp','Introduction to Fractal Circles','At this week\'s Eden Town Hall, we can have an introduction to the Fractal Circles project from Mikael, who has been developing fractal governance concepts for over 15 years. The Fractal Circle Bot is a collaborative decision-making tool that helps groups discuss ideas, evaluate proposals, and select representatives through multiple rounds of small-group discussion — all within Telegram.<br><br>Learn more at <a href="https://FractalCircles.org" class="text-indigo-600 hover:underline" target="_blank">FractalCircles.org</a> and the <a href="https://fractalcircles.org/2026/01/07/fractal-circle-bot-manual/" class="text-indigo-600 hover:underline" target="_blank">Bot Manual</a>.');
  setDesc(133,'tp','Optimism Fractal Hiatus','After over two years of consistent events, Optimism Fractal recently entered an indefinite strategic hiatus. This topic provides space for reflection on Optimism Fractal\'s journey and impact, as well as an opportunity to welcome Optimism Fractal community members joining Eden Fractal. Optimism Fractal hosted 72 events (+40 more Town Halls), facilitated hundreds of presentations, and pioneered testing of governance tools like ORDAO and Fractalgram on OP Mainnet.');
  setDesc(133,'tp','Continuing Discussions','Over the past several weeks of Synchronous Respect Trees and Town Halls, our community has proposed many valuable topics for discussion, and we have not yet had time to explore all of them in depth. This topic proposes we revisit and continue discussions on topics that received community interest but have not yet been fully addressed.');

  setDesc(133,'cr','Documentation for ORDAO','Improve documentation for ORDAO and related tooling. Address concerns raised here: <a href="https://fractalnouns.notion.site/ORDAO-OREC-DOCUMENTATION-GAPS-2e6384a11f5680f5b524efc66f2d1a98" class="text-indigo-600 hover:underline" target="_blank">ORDAO/OREC Documentation Gaps</a>');
  setDesc(133,'cr','Fractalgram requirements','Fractalgram is core component of Eden Fractal. This contribution request is about the first few steps — creating and then aligning on requirements specification. It makes sense to seek alignment, because this app has potential to be useful to both old and new iterations of fractals. Also an opportunity to experiment with <a href="https://github.com/github/spec-kit" class="text-indigo-600 hover:underline" target="_blank">Github Spec-kit</a>.');
  setDesc(133,'cr','A game to guide discussion','While Synchronous Respect Trees effectively signal priority topics between meetings, they are insufficient for democratically controlling real-time meeting flow. This proposal requests creation of a simple game mechanism that would complement SRT by allowing participants to signal when to switch topics during meetings.<br><br><a href="https://hackmd.io/@sim31/meeting-ctrl-cr" class="text-indigo-600 hover:underline" target="_blank">Full problem statement and request</a>.');
  setDesc(133,'cr','Educational resource developmen','Eden Fractal needs better educational resources. Contributions can include: written content (articles, guides), technical documentation, workflow development with AI tools, FAQ and Q&A resources, website improvements, and video content (interviews, introductory videos, edited clips).');
  setDesc(133,'cr','Tech development for gov tools','Eden Fractal relies on several core technical tools. Priority areas include: Fractalgram (Respect Game interface), ORDAO (on-chain governance), Eden+Fractal Process improvements, experimental applications exploring different approaches to fractal coordination, and infrastructure improvements.');
  setDesc(133,'cr','Engagement and outreach','Eden Fractal thrives through active community engagement. Quality matters more than quantity — inviting one highly engaged contributor often creates more value than attracting many passive observers. Contributions include inviting strong-fit people to join events, welcoming and onboarding new participants, building relationships with collaborators in adjacent spaces.');
  setDesc(133,'cr','Research Fractal decision-making','Eden Fractal\'s mission includes collaborative research. Contributions can include: process documentation, practitioner interviews, comparative analysis with other communities, innovation research into novel coordination mechanisms, and theoretical engagement with literature on fractal democracy.');

  setDesc(134,'tp','Update ORDAO configuration','Current configuration of Eden Fractal\'s ORDAO was meant to be temporary. It is becoming too limiting when we start passing more proposals per week. Proposed changes: <a href="https://hackmd.io/@sim31/ef-ordao-config-update" class="text-indigo-600 hover:underline" target="_blank">hackmd.io/@sim31/ef-ordao-config-update</a>');
  setDesc(134,'tp','More Equal Animals Anniversary','February 21st marks the five-year anniversary of "More Equal Animals: The Subtle Art of True Democracy" by Daniel Larimer — the book that sparked the Eden community and laid the philosophical foundation for fractal democracy. Nearly five years later, our community is a living testament to the power of these ideas.<br><br><a href="https://edenfractal.com/blog/the-foundations-evolution-of-fractal-democracy-2021-2022" class="text-indigo-600 hover:underline" target="_blank">More Equal Animals and the Foundations of Eden</a>');
  setDesc(134,'tp','Fractalgram dev discussions','<a href="https://optimystics.io/fractalgram" class="text-indigo-600 hover:underline" target="_blank">Fractalgram</a> has been a major topic of discussion. Our community has been actively working to specify how the next generation of this essential tool should be built. Recent discussions have covered cross-platform architecture, spec-driven development using GitHub, platform priorities (Telegram as primary), and integration with ORDAO.');
  setDesc(134,'tp','Eden Fractal 2026 Resolutions','Re-proposing this topic to continue conversation about collective goals for 2026. This topic invites participants to share thoughts on what we should prioritize this year and how we can support each other in spreading fractal democracy.');
  setDesc(134,'tp','Fractalgram','Fractalgram is core component of Eden Fractal and many other fractals. We currently do not have a reliably working implementation. We should prioritize this because it\'s essential for user friendly experience in fractals. We can discuss existing tools and approaches.');
  setDesc(134,'tp','SRT V1 improvements','Currently the biggest problem with our <a href="https://hackmd.io/@sim31/srt-1" class="text-indigo-600 hover:underline" target="_blank">current SRT game</a> is the lack of a clear score accumulation and reporting system. It would be useful to have a page where people could see all CRs created throughout the current season. Possible solution: create a toolchain that builds a report by processing results of last N SRT periods with some kind of decay mechanism.');

  setDesc(134,'cr','Educational resources','Eden Fractal needs better educational resources. Contributions can include writing articles, developing FAQ resources, improving website content, creating technical documentation, exploring AI-powered workflows, and producing video content.<br><br><a href="https://www.notion.so/CR-Educational-Resource-Development-302074f5adac80a1ac57e94dffee4eb8" class="text-indigo-600 hover:underline" target="_blank">Read the full contribution request</a>');
  setDesc(134,'cr','Technical development','Eden Fractal relies on several core technical tools. Priority areas include Fractalgram, ORDAO, Eden+Fractal consensus process, and related tools. AI-assisted development makes it easier than ever to contribute.<br><br><a href="https://www.notion.so/CR-Technical-Development-for-Fractal-Governance-Tools-302074f5adac800f86b2f9094faebbac" class="text-indigo-600 hover:underline" target="_blank">Read the full contribution request</a>');
  setDesc(134,'cr','Engagement and outreach','Eden Fractal thrives through active community engagement. Quality matters more than quantity. Contributions include inviting strong-fit people, welcoming new participants, building relationships with collaborators.<br><br><a href="https://www.notion.so/CR-Community-Engagement-and-Contributor-Outreach-302074f5adac80e383f4e788810b4820" class="text-indigo-600 hover:underline" target="_blank">Read the full contribution request</a>');
  setDesc(134,'cr','Fractal decision-making research','Eden Fractal\'s mission includes collaborative research. Research can include studying how fractal governance works in practice, interviewing practitioners, exploring other communities\' processes, investigating novel coordination mechanisms.<br><br><a href="https://www.notion.so/CR-Research-into-Fractal-Decision-Making-Processes-302074f5adac80cb9ad1d3dad0084371" class="text-indigo-600 hover:underline" target="_blank">Read the full contribution request</a>');
  setDesc(134,'cr','Fractalgram','Fractalgram is core component of Eden Fractal and many other fractals. We should prioritize it because it\'s essential for user friendly experience in fractals.');
  setDesc(134,'cr','Non-profit for fractal ecosystem','A non profit could help Eden Fractal by accepting donations and distributing funds to contributors. Part of a broader vision: <a href="https://hackmd.io/@sim31/ef-vision-p132" class="text-indigo-600 hover:underline" target="_blank">hackmd.io/@sim31/ef-vision-p132</a>');
  setDesc(134,'cr','Firmament','Firmament is an old project idea. The new version is much simpler and could give Eden Fractal: systematic integration of consensus tools, governance document tracking and versioning, uniting legislative and executive branches into a single chain, concept of mining from a laptop, and systematic AI agent integration.<br><br>Resources: <a href="https://peakd.com/fractally/@sim31/fractal-blockchains" class="text-indigo-600 hover:underline" target="_blank">Original article</a> · <a href="https://optimystics.io/firmament" class="text-indigo-600 hover:underline" target="_blank">Blog post by Dan Singjoy</a>');

  // Period 135 Topics
  setDesc(135,'tp','Update ORDAO configuration','Current ORDAO configuration is becoming too limiting. Proposed changes: <a href="https://hackmd.io/@sim31/ef-ordao-config-update" class="text-indigo-600 hover:underline" target="_blank">hackmd.io/@sim31/ef-ordao-config-update</a><br><br>New proposals: <a href="https://ef.frapps.xyz/proposals/0x73bc8a57f340af35b4f0416f53a73734b773b0ed281d11c618aee2ab1cdb061f" class="text-indigo-600 hover:underline" target="_blank">Set periods</a> · <a href="https://ef.frapps.xyz/proposals/0xd907c1f53c66530bcc9544c3fd77b948f32781fb6ed8161832a3747e14d0f199" class="text-indigo-600 hover:underline" target="_blank">Set max live yes votes</a>');
  setDesc(135,'tp','SRT V1 improvements/feedback','We\'ve started discussing this in <a href="https://youtu.be/Vo8k91wwA9g?t=605" class="text-indigo-600 hover:underline" target="_blank">Eden Town Hall 72</a>. Key ideas:<br>• <a href="https://hackmd.io/@sim31/srt-v1-impr-p135#1-Use-SRT-V1-as-flat-issue-tracker-instead-of-as-a-tree" class="text-indigo-600 hover:underline" target="_blank">Use SRT V1 as flat issue tracker instead of as a tree?</a><br>• <a href="https://hackmd.io/@sim31/srt-v1-impr-p135#2-Contribution-Requests-and-Contributions-are-one-and-the-same" class="text-indigo-600 hover:underline" target="_blank">Contribution Requests and Contributions are one and the same?</a>');
  setDesc(135,'tp','Fractalgram','Fractalgram has been a major topic of discussion. Our community has been actively working to specify how the next generation should be built. Recent discussions have covered cross-platform architecture, spec-driven development, platform priorities, and integration with ORDAO.<br><br><em>Original post:</em> <a href="https://t.me/edenfractal/5562/6193" class="text-indigo-600 hover:underline" target="_blank">t.me/edenfractal/5562/6193</a>');
  setDesc(135,'tp','Eden Fractal Community Agreement','Creating a community agreement has been an outstanding goal for years. A clear agreement helps set expectations, protect the community, and provide a foundation for scaling — including clarifying that Respect tokens represent community opinions, establishing video consent, and defining governance expectations.<br><br>Prior discussions: <a href="https://youtu.be/_a-SbzL5_xY?t=4617" class="text-indigo-600 hover:underline" target="_blank">Event 37</a> · <a href="https://edenfractal.com/38" class="text-indigo-600 hover:underline" target="_blank">Event 38</a> · <a href="https://edencreators.com/agreement" class="text-indigo-600 hover:underline" target="_blank">EdenCreators.com/agreement</a>');
  setDesc(135,'tp','Eden Fractal Intent Document','Eden Fractal needs its own Intent Document — an operating manual for community coordination defining technical specifications, governance processes, and community expectations. <a href="https://optimismfractal.com/details" class="text-indigo-600 hover:underline" target="_blank">Optimism Fractal\'s Intent Document</a> provides a strong starting point.');
  setDesc(135,'tp','Eden+Fractal Improvements','<a href="https://edenfractal.com/plus" class="text-indigo-600 hover:underline" target="_blank">Eden+Fractal</a> is our legislative consensus process for choosing delegates and making community decisions. It\'s been working well overall, but there are clear areas for improvement. Delegate attendance has been a challenge, and our current tooling is basically an article and a Google spreadsheet.');
  setDesc(135,'tp','Recognizing Prior Contributions','Eden Fractal did not distribute Respect tokens between approximately events 63 and 120 (~35-40% of total events). For events 63–83, Respect Games were played but tokens never distributed. For events 83–120, no Respect Games were played but people contributed significantly. One idea: using an AI agent to review un-executed proposals and generate attendance records.');
  setDesc(135,'tp','2026 Resolutions and Break Plans','<strong>2026 Resolutions:</strong> Align on what we hope to accomplish this year. Share thoughts on priorities and how to support each other in spreading fractal democracy.<br><br><strong>Break Planning:</strong> We\'re on the 7th week of events. Traditionally ~12 weeks before a mid-season break. Also: US daylight saving March 8, Europe summer time March 29 — time difference shifts temporarily.');
  setDesc(135,'tp','Exploring Matrix.org','<a href="https://matrix.org/" class="text-indigo-600 hover:underline" target="_blank">Matrix</a> is an open-source, decentralized communication protocol. It has a <a href="https://spec.matrix.org/" class="text-indigo-600 hover:underline" target="_blank">spec-driven development process</a> and is building Matrix P2P. Potential for us to use their tools, learn from their processes, and collaborate.<br><br><a href="https://www.youtube.com/watch?v=-Keu8aE8t08" class="text-indigo-600 hover:underline" target="_blank">Video showcasing latest updates</a>');

  setDesc(135,'cr','Firmament','Firmament is an old project idea, now reimagined as a simpler system. Benefits: systematic consensus tool integration, governance document versioning, uniting legislative and executive branches, mining from a laptop, AI agent integration.<br><br>Resources: <a href="https://peakd.com/fractally/@sim31/fractal-blockchains" class="text-indigo-600 hover:underline" target="_blank">Original article</a> · <a href="https://optimystics.io/firmament" class="text-indigo-600 hover:underline" target="_blank">Blog post</a>');
  setDesc(135,'cr','Non-profit for fractal ecosystem','A non profit could help Eden Fractal by accepting donations and distributing funds to contributors. Part of a broader vision: <a href="https://hackmd.io/@sim31/ef-vision-p132" class="text-indigo-600 hover:underline" target="_blank">hackmd.io/@sim31/ef-vision-p132</a>');
  setDesc(135,'cr','Quicker uploads of videos','Meeting recordings <a href="https://www.youtube.com/@EdenCreators/videos" class="text-indigo-600 hover:underline" target="_blank">uploaded to EdenCreators</a> lag by about 1 week or more. More immediate availability would help people catch up, keep community in-sync, and help secure state transitions of Eden Fractal (e.g. verifying respect distribution proposals in ORDAO). Maybe livestream would be an option?');
  setDesc(135,'cr','Fractalgram','Fractalgram is core component of Eden Fractal. <a href="https://t.me/edenfractal/1/6226" class="text-indigo-600 hover:underline" target="_blank">The old fractalgram is fixed</a> but far from the app we want for newcomers. We\'ve started discussing new designs:<br>• <a href="https://hackmd.io/@sim31/fractalgram2-design-1" class="text-indigo-600 hover:underline" target="_blank">Design Principles Part 1</a><br>• <a href="https://youtu.be/IEpsX-8ZTMA" class="text-indigo-600 hover:underline" target="_blank">Town Hall discussion</a><br>• <a href="https://www.youtube.com/watch?v=SMkPXd-1B_g" class="text-indigo-600 hover:underline" target="_blank">Spec-driven development discussion</a>');
  setDesc(135,'cr','Educational Resources','Eden Fractal needs better educational resources. Contributions can include writing articles, FAQ resources, website improvements, technical documentation, AI workflows for content creation, and video content.');
  setDesc(135,'cr','Community Engagement','Eden Fractal thrives through active community engagement. Quality matters more than quantity. Contributions include inviting strong-fit people, welcoming new participants, building relationships with collaborators.');
  setDesc(135,'cr','Fractal Research','Eden Fractal\'s mission includes collaborative research. Research can include studying fractal governance in practice, interviewing practitioners, comparative analysis, investigating novel coordination mechanisms, and engaging with theory.');
  setDesc(135,'cr','Eden Fractal Intent Document','Eden Fractal needs an Intent Document — an operating manual defining how the Respect Game functions, how governance works, and how decisions are made. Following the model of <a href="https://optimismfractal.com/details" class="text-indigo-600 hover:underline" target="_blank">Optimism Fractal\'s Intent Document</a>. Contributions can include researching scope, drafting sections, reviewing other fractal communities\' structures.');
  setDesc(135,'cr','Eden Fractal Community Agreement','Eden Fractal needs a community agreement that establishes clear expectations and protections for participants. Contributions can include researching prior discussions, drafting terms covering video consent, governance participation, and the nature of Respect as an opinion token, and exploring tools like Hats Protocol for onchain agreement signing.<br><br>See prior discussions: <a href="https://edencreators.com/agreement" class="text-indigo-600 hover:underline" target="_blank">EdenCreators.com/agreement</a>');

  // ── Compute cumulative scores ─────────────────────────────────────────────
  function buildCumulativeTable(type) {
    const descType = type === 'topics' ? 'tp' : 'cr';
    const rows = [];
    const nameMap = new Map();

    for (const p of DATA.periods) {
      const poll = p[type];
      for (const c of poll.choices) {
        if (!nameMap.has(c.name)) {
          nameMap.set(c.name, rows.length);
          rows.push({
            name: c.name,
            proposer: c.proposer,
            periodScores: {},
            cumulative: 0,
            descs: {} // period -> description
          });
        }
        const idx = nameMap.get(c.name);
        const weighted = c.score * p.decayWeight;
        rows[idx].periodScores[p.period] = { raw: c.score, weighted, votes: poll.votes };
        rows[idx].cumulative += weighted;
        const d = getDesc(p.period, descType, c.name);
        if (d) rows[idx].descs[p.period] = d;
      }
    }

    rows.sort((a, b) => b.cumulative - a.cumulative);
    return rows;
  }

  let descIdCounter = 0;
  function nextDescId() { return 'desc-' + (descIdCounter++); }

  // ── Rendering helpers ─────────────────────────────────────────────────────
  function fmt(n) { return n.toFixed(2); }

  function renderBar(value, maxValue) {
    const pct = maxValue > 0 ? (value / maxValue) * 100 : 0;
    return `<div class="w-full bg-gray-100 rounded-full h-2.5 mt-1">
      <div class="decay-bar bg-indigo-500 h-2.5 rounded-full" style="width: ${pct.toFixed(1)}%"></div>
    </div>`;
  }

  function renderPeriodBadge(period) {
    const colors = { 133: 'bg-amber-100 text-amber-800', 134: 'bg-sky-100 text-sky-800', 135: 'bg-emerald-100 text-emerald-800' };
    return `<span class="inline-block text-xs font-medium px-2 py-0.5 rounded ${colors[period] || 'bg-gray-100'}">P${period}</span>`;
  }

  function renderSection(title, type) {
    const rows = buildCumulativeTable(type);
    if (rows.length === 0) return '';

    const maxCum = rows[0].cumulative;
    const periods = DATA.meta.periodsIncluded;

    let periodHeaders = periods.map(p =>
      `<th class="px-3 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">P${p}<br><span class="text-[10px] normal-case text-gray-400">×${DATA.periods.find(d => d.period === p).decayWeight}</span></th>`
    ).join('');

    const colCount = 3 + periods.length;

    let tableRows = rows.map((r, i) => {
      const rank = i + 1;
      const id = nextDescId();
      const periodCells = periods.map(p => {
        const ps = r.periodScores[p];
        if (!ps) return `<td class="px-3 py-3 text-right text-gray-300 score-cell">—</td>`;
        return `<td class="px-3 py-3 text-right score-cell">
          <span class="text-gray-800 font-medium">${fmt(ps.weighted)}</span>
          <br><span class="text-xs text-gray-400">${fmt(ps.raw)} raw</span>
        </td>`;
      }).join('');

      const periodsPresent = periods.filter(p => r.periodScores[p]).map(renderPeriodBadge).join(' ');

      // Build description content: show most recent period's description, with tabs if multiple
      const descPeriods = Object.keys(r.descs).map(Number).sort((a, b) => b - a);
      let descHtml = '';
      if (descPeriods.length > 0) {
        if (descPeriods.length === 1) {
          descHtml = `<div class="text-sm text-gray-600 leading-relaxed">${r.descs[descPeriods[0]]}</div>`;
        } else {
          const tabsId = id + '-tabs';
          descHtml = `
            <div class="mb-2 flex gap-1 flex-wrap">${descPeriods.map((p, ti) =>
              `<button onclick="event.stopPropagation(); switchDescTab('${tabsId}', ${p})" class="desc-tab-btn px-2.5 py-1 text-xs rounded font-medium transition-colors ${ti === 0 ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}" data-tabgroup="${tabsId}" data-period="${p}">P${p}</button>`
            ).join('')}</div>
            ${descPeriods.map((p, ti) =>
              `<div class="desc-tab-panel text-sm text-gray-600 leading-relaxed ${ti === 0 ? '' : 'hidden'}" data-tabgroup="${tabsId}" data-period="${p}">${r.descs[p]}</div>`
            ).join('')}
          `;
        }
      }

      return `<tr class="cursor-pointer hover:bg-indigo-50/40 transition-colors ${rank % 2 === 0 ? 'bg-gray-50/50' : ''}" onclick="toggleDesc('${id}')">
        <td class="px-3 py-3 text-center text-gray-400 font-medium">${rank}</td>
        <td class="px-3 py-3">
          <div class="font-medium text-gray-900 flex items-center gap-1.5">
            <span class="text-indigo-400 text-[10px] desc-arrow" id="${id}-arrow">▶</span>
            ${r.name}
          </div>
          <div class="text-xs text-gray-400 mt-0.5 ml-4">${r.proposer} · ${periodsPresent}</div>
        </td>
        <td class="px-4 py-3 text-right score-cell">
          <span class="text-lg font-semibold text-indigo-700">${fmt(r.cumulative)}</span>
          ${renderBar(r.cumulative, maxCum)}
        </td>
        ${periodCells}
      </tr>
      <tr id="${id}" class="hidden">
        <td colspan="${colCount}" class="px-6 py-4 bg-indigo-50/30 border-b border-indigo-100">
          ${descHtml || '<span class="text-sm text-gray-400 italic">No description available.</span>'}
        </td>
      </tr>`;
    }).join('');

    // Per-period detail
    let periodDetails = DATA.periods.map(p => {
      const poll = p[type];
      const sorted = [...poll.choices].sort((a, b) => b.score - a.score);
      const maxScore = sorted[0]?.score || 1;
      const descType = type === 'topics' ? 'tp' : 'cr';
      const choiceRows = sorted.map((c, i) => {
        const did = nextDescId();
        const d = getDesc(p.period, descType, c.name);
        return `
        <tr class="cursor-pointer hover:bg-indigo-50/30 transition-colors ${i % 2 === 0 ? '' : 'bg-gray-50/50'}" onclick="toggleDesc('${did}')">
          <td class="px-3 py-2 text-center text-gray-400 text-sm">${i + 1}</td>
          <td class="px-3 py-2 text-sm">
            <span class="text-indigo-400 text-[10px] desc-arrow" id="${did}-arrow">▶</span>
            ${c.name} <span class="text-gray-400 text-xs">— ${c.proposer}</span>
          </td>
          <td class="px-3 py-2 text-right text-sm font-medium score-cell">${fmt(c.score)}</td>
          <td class="px-3 py-2 w-32">
            <div class="w-full bg-gray-100 rounded-full h-2">
              <div class="bg-indigo-400 h-2 rounded-full" style="width: ${(c.score / maxScore * 100).toFixed(1)}%"></div>
            </div>
          </td>
        </tr>
        <tr id="${did}" class="hidden">
          <td colspan="4" class="px-6 py-3 bg-indigo-50/20 border-b border-indigo-50">
            <div class="text-sm text-gray-600 leading-relaxed">${d || '<span class="italic text-gray-400">No description available.</span>'}</div>
          </td>
        </tr>`;
      }).join('');

      // Missing items for this period
      let missingHtml = '';
      if (p.missingItems) {
        const relevant = p.missingItems.filter(m => m.type === (type === 'topics' ? 'tp' : 'cr'));
        if (relevant.length > 0) {
          missingHtml = relevant.map(m => `
            <div class="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-800">
              <strong>⚠ Missing:</strong> "${m.name}" (by ${m.proposer}) — ${m.reason}
            </div>
          `).join('');
        }
      }

      return `
        <details class="border border-gray-200 rounded-lg overflow-hidden">
          <summary class="px-4 py-3 bg-white hover:bg-gray-50 font-medium text-sm">
            Period ${p.period}
            <span class="text-gray-400 font-normal ml-2">${p.dates.stage1Start} → ${p.dates.stage2End} · ${poll.votes} voter${poll.votes !== 1 ? 's' : ''} · Total: ${fmt(poll.scoresTotal)}</span>
            <a href="${poll.snapshotUrl}" target="_blank" rel="noopener" class="ml-2 text-indigo-500 hover:text-indigo-700 text-xs">[Snapshot ↗]</a>
          </summary>
          <div class="px-2 py-2">
            <table class="w-full">
              <thead><tr class="border-b border-gray-100">
                <th class="px-3 py-2 text-left text-xs text-gray-400 w-10">#</th>
                <th class="px-3 py-2 text-left text-xs text-gray-400">Proposal</th>
                <th class="px-3 py-2 text-right text-xs text-gray-400">Score</th>
                <th class="px-3 py-2 text-xs text-gray-400 w-32"></th>
              </tr></thead>
              <tbody>${choiceRows}</tbody>
            </table>
            ${missingHtml}
          </div>
        </details>
      `;
    }).join('');

    return `
      <section class="mb-12">
        <h2 class="text-2xl font-bold text-gray-900 mb-1">${title}</h2>
        <p class="text-sm text-gray-500 mb-5">Cumulative scores across periods 133–135, weighted by exponential decay (λ = ${DATA.meta.decayFactor}). <span class="text-gray-400">Click any row to see full description.</span></p>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="border-b border-gray-200 bg-gray-50/80">
                  <th class="px-3 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider w-12">#</th>
                  <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Proposal</th>
                  <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider w-40">Cumulative</th>
                  ${periodHeaders}
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">${tableRows}</tbody>
            </table>
          </div>
        </div>

        <h3 class="text-lg font-semibold text-gray-700 mb-3">Per-Period Breakdown</h3>
        <div class="space-y-2">${periodDetails}</div>
      </section>
    `;
  }

  // ── Toggle / Tab logic ─────────────────────────────────────────────────────
  function toggleDesc(id) {
    const row = document.getElementById(id);
    const arrow = document.getElementById(id + '-arrow');
    if (!row) return;
    const isHidden = row.classList.contains('hidden');
    row.classList.toggle('hidden');
    if (arrow) arrow.textContent = isHidden ? '▼' : '▶';
  }

  function switchDescTab(tabGroupId, period) {
    document.querySelectorAll(`.desc-tab-btn[data-tabgroup="${tabGroupId}"]`).forEach(btn => {
      const active = Number(btn.dataset.period) === period;
      btn.className = btn.className.replace(/bg-\S+/g, '').replace(/text-\S+/g, '').trim();
      btn.classList.add('desc-tab-btn', 'px-2.5', 'py-1', 'text-xs', 'rounded', 'font-medium', 'transition-colors');
      if (active) { btn.classList.add('bg-indigo-100', 'text-indigo-700'); }
      else { btn.classList.add('bg-gray-100', 'text-gray-500', 'hover:bg-gray-200'); }
    });
    document.querySelectorAll(`.desc-tab-panel[data-tabgroup="${tabGroupId}"]`).forEach(panel => {
      panel.classList.toggle('hidden', Number(panel.dataset.period) !== period);
    });
  }

  // ── Render ────────────────────────────────────────────────────────────────
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="mb-8 p-5 bg-white rounded-xl shadow-sm border border-gray-200">
      <h2 class="text-lg font-semibold text-gray-800 mb-2">About this report</h2>
      <p class="text-sm text-gray-600 mb-3">
        This report aggregates results from 3 sessions of the
        <a href="https://hackmd.io/@sim31/srt-1" class="text-indigo-600 hover:underline" target="_blank">Synchronous Respect Trees V1</a>
        game played by the Eden Fractal community. Each session produces two polls on
        <a href="https://snapshot.box/#/s:edenfractal.eth" class="text-indigo-600 hover:underline" target="_blank">Snapshot</a>:
        one for <strong>Topic Proposals (TPs)</strong> and one for <strong>Contribution Requests (CRs)</strong>.
      </p>
      <div class="flex flex-wrap gap-4 text-sm">
        <div class="flex items-center gap-2">
          <span class="inline-block w-3 h-3 rounded-full bg-amber-300"></span>
          <span><strong>Period 133</strong> — weight ×0.25</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="inline-block w-3 h-3 rounded-full bg-sky-400"></span>
          <span><strong>Period 134</strong> — weight ×0.50</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="inline-block w-3 h-3 rounded-full bg-emerald-500"></span>
          <span><strong>Period 135</strong> — weight ×1.00</span>
        </div>
      </div>
    </div>

    ${renderSection('Topic Proposals', 'topics')}
    ${renderSection('Contribution Requests', 'crs')}

    <footer class="mt-12 pt-8 border-t border-gray-200 text-sm text-gray-500 space-y-4 pb-12">
      <div>
        <h3 class="font-semibold text-gray-700 mb-1">Methodology</h3>
        <p>
          Scores are accumulated using an <strong>exponential decay</strong> function on raw (un-normalized) scores.
          The formula is: <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">cumulative = Σ (raw_score × λ<sup>(N−i)</sup>)</code>
          where <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">λ = ${DATA.meta.decayFactor}</code>,
          <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">N = 2</code> (index of most recent period),
          and <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">i</code> is the period index (0, 1, 2).
          This means the most recent period has full weight (×1), the previous period is halved (×0.5), and the oldest is quartered (×0.25).
          Periods with more voters naturally contribute more to the cumulative score (no normalization is applied).
        </p>
      </div>
      <div>
        <h3 class="font-semibold text-gray-700 mb-1">Snapshot Poll Links</h3>
        <ul class="space-y-1">
          ${DATA.periods.map(p => `
            <li>
              <strong>Period ${p.period}:</strong>
              <a href="${p.topics.snapshotUrl}" target="_blank" class="text-indigo-600 hover:underline">Topics ↗</a> ·
              <a href="${p.crs.snapshotUrl}" target="_blank" class="text-indigo-600 hover:underline">CRs ↗</a>
            </li>
          `).join('')}
        </ul>
      </div>
      <p class="text-xs text-gray-400">
        Generated on 2026-03-05. Game rules:
        <a href="https://hackmd.io/@sim31/srt-1" class="text-indigo-500 hover:underline" target="_blank">SRT V1</a>.
      </p>
    </footer>
  `;
  </script>
</body>
</html>
